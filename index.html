<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Door Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- REMOVED: /_sdk/element_sdk.js -->
  <!-- REMOVED: /_sdk/data_sdk.js -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
      font-family: 'Nunito', sans-serif;
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
      50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.8); }
    }
    
    @keyframes slide-in {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .sensor-active {
      animation: pulse-glow 1.5s ease-in-out infinite;
    }
    
    .notification-slide {
      animation: slide-in 0.5s ease-out;
    }
    
    .fade-in {
      animation: fade-in 0.6s ease-out forwards;
    }
    
    .activity-item {
      animation: fade-in 0.4s ease-out;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
   <!-- Notification Toast -->
   <div id="notification-toast" class="fixed top-4 right-4 z-50 hidden">
    <div class="bg-emerald-500 text-white px-6 py-4 rounded-2xl shadow-2xl notification-slide flex items-center gap-3 max-sm">
     <div class="text-3xl">
      🐾
     </div>
     <div>
      <p class="font-bold" id="notification-title">Pet Alert!</p>
      <p class="text-sm opacity-90" id="notification-message"></p>
     </div>
    </div>
   </div><!-- Login Screen -->
   <div id="login-screen" class="min-h-full flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-md fade-in">
     <div class="text-center mb-8">
      <div class="text-7xl mb-4">
       🏠🐕
      </div>
      <h1 id="login-title" class="text-4xl font-extrabold text-white mb-2">Pet Door Tracker</h1>
      <p class="text-slate-300 text-lg">Monitor your pet's activity</p>
     </div>
     <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 shadow-2xl border border-white/20">
      <div class="space-y-5">
       <div>
        <label for="login-username" class="block text-white font-semibold mb-2 text-sm">Username</label> <input type="text" id="login-username" placeholder="Enter your username" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 placeholder-slate-400 font-medium focus:outline-none focus:ring-4 focus:ring-emerald-400/50 transition-all">
       </div>
       <div>
        <label for="login-password" class="block text-white font-semibold mb-2 text-sm">Password</label> <input type="password" id="login-password" placeholder="Enter your password" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 placeholder-slate-400 font-medium focus:outline-none focus:ring-4 focus:ring-emerald-400/50 transition-all">
       </div>
       <div id="login-error" class="text-red-400 text-sm text-center hidden"></div><button onclick="handleLogin()" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold rounded-xl text-lg transition-all transform hover:scale-[1.02] shadow-lg shadow-emerald-500/30"> Login 🐾 </button>
       <div class="flex gap-3"><button onclick="goToSignup()" class="flex-1 py-3 bg-white/10 hover:bg-white/20 text-emerald-400 font-semibold rounded-xl transition-all border border-emerald-400/50"> Sign Up </button> <button onclick="goToForgotPassword()" class="flex-1 py-3 bg-white/10 hover:bg-white/20 text-blue-400 font-semibold rounded-xl transition-all border border-blue-400/50"> Forgot Password? </button>
       </div>
      </div>
     </div>
    </div>
   </div><!-- Setup Screen (Modified for Simulation) -->
   <div id="setup-screen" class="min-h-full flex flex-col items-center justify-center p-6 hidden">
    <div class="w-full max-w-md fade-in">
     <div class="text-center mb-8">
      <div class="text-7xl mb-4">
       🏠🐕
      </div>
      <h1 id="main-title" class="text-4xl font-extrabold text-white mb-2">Pet Door Tracker</h1>
      <p id="subtitle" class="text-slate-300 text-lg">Monitor your pet's activity</p>
     </div>
     <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 shadow-2xl border border-white/20">
      <div class="space-y-5">
       <!-- Your Name Section -->
       <div>
        <label for="owner-name" class="block text-white font-semibold mb-2 text-sm">Your Name</label> <input type="text" id="owner-name" placeholder="Enter your name" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 placeholder-slate-400 font-medium focus:outline-none focus:ring-4 focus:ring-emerald-400/50 transition-all">
       </div><!-- Address Section -->
       <div>
        <label for="owner-address" class="block text-white font-semibold mb-2 text-sm">Your Address</label> <input type="text" id="owner-address" placeholder="Enter your address" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 placeholder-slate-400 font-medium focus:outline-none focus:ring-4 focus:ring-emerald-400/50 transition-all">
       </div><!-- Pet Names Section -->
       <div class="border-t border-white/20 pt-5">
        <h2 class="text-white font-bold text-lg mb-4">Your Pets</h2><label for="pet-names" class="block text-white font-semibold mb-2 text-sm">Pet Names (comma-separated)</label> <input type="text" id="pet-names" placeholder="e.g., Max, Bella, Charlie" class="w-full px-5 py-4 rounded-xl bg-white/90 text-slate-800 placeholder-slate-400 font-medium focus:outline-none focus:ring-4 focus:ring-emerald-400/50 transition-all">
        <p class="text-slate-400 text-xs mt-2">Add multiple pets separated by commas</p>
       </div><!-- Simulation Section -->
       <div class="border-t border-white/20 pt-5">
        <h2 class="text-white font-bold text-lg mb-4">💻 Simulation Mode</h2>
        <p class="text-slate-400 text-sm mb-4">No hardware needed. Click verify to initialize the simulator.</p>
        <p id="sensor-1-status" class="text-slate-400 text-sm mb-2">Simulator Status: <span class="text-amber-300">Ready to initialize</span></p>
       </div><!-- Verify Button -->
       <div class="pt-2">
        <button onclick="verifySensors()" class="w-full py-4 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold rounded-xl text-lg transition-all transform hover:scale-[1.02] shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2"> <span class="text-xl">✓</span> <span>Verify Simulator</span> </button>
       </div><!-- Start Tracking Button --> <button id="start-btn" onclick="startTracking()" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold rounded-xl text-lg transition-all transform hover:scale-[1.02] shadow-lg shadow-emerald-500/30 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none" disabled> Start Simulation 🐾 </button> <!-- Logout Button --> <button onclick="logout()" class="w-full py-3 bg-white/10 hover:bg-white/20 text-white font-semibold rounded-xl transition-all border border-white/20"> Logout </button>
      </div>
     </div>
    </div>
   </div>

  <script>
    function handleLogin() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('setup-screen').classList.remove('hidden');
    }
    
    function verifySensors() {
      const status = document.getElementById('sensor-1-status');
      status.innerHTML = 'Simulator Status: <span class="text-emerald-400">Verified ✓</span>';
      document.getElementById('start-btn').disabled = false;
    }
    
    function startTracking() {
      alert("Simulation started! Pet activity will appear shortly.");
      // You can add logic here to trigger the toast periodically
    }
    
    function logout() {
      location.reload();
    }
  </script>
     <script>
    lucide.createIcons();

    function handleLogin() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('setup-screen').classList.remove('hidden');
    }
    
    function verifySensors() {
      const status = document.getElementById('sensor-1-status');
      status.innerHTML = 'Simulator Status: <span class="text-emerald-400 font-bold">Verified ✓</span>';
      
      const startBtn = document.getElementById('start-btn');
      startBtn.disabled = false;
      startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
    }
    
    function startTracking() {
      const toast = document.getElementById('notification-toast');
      const msg = document.getElementById('notification-message');
      const petInput = document.getElementById('pet-names').value;
      
      // Get the names you typed in
      const pets = petInput.split(',').map(p => p.trim()).filter(p => p !== "");
      
      alert("Simulation Active! Watch for alerts in the top right.");

      // Start the loop to show alerts automatically
      setInterval(() => {
        const pet = pets.length > 0 ? pets[Math.floor(Math.random() * pets.length)] : "A pet";
        const action = Math.random() > 0.5 ? "came inside" : "went outside";
        
        // Update and show your toast
        msg.innerText = `${pet} just ${action}!`;
        toast.classList.remove('hidden');
        
        // Hide it after 3 seconds
        setTimeout(() => {
          toast.classList.add('hidden');
        }, 3000);
      }, 6000); // Happens every 6 seconds
    }
    
    function logout() {
      location.reload();
    }
  </script>
</body>
</html>

 </body>
</html>
