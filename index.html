<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Door Tracker</title>
  <script src="https://tailwindcss.com"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    body { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); } 50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.8); } }
    @keyframes slide-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .sensor-active { animation: pulse-glow 1.5s ease-in-out infinite; }
    .notification-slide { animation: slide-in 0.5s ease-out; }
    .fade-in { animation: fade-in 0.6s ease-out forwards; }
    .activity-item { animation: fade-in 0.4s ease-out; }
  </style>
  <script src="https://tailwindcss.com/3.4.17"></script>
  <script src="https://jsdelivr.net"></script>
</head>
<body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
    <div id="notification-toast" class="fixed top-4 right-4 z-50 hidden">
      <div class="bg-emerald-500 text-white px-6 py-4 rounded-2xl shadow-2xl notification-slide flex items-center gap-3 max-w-sm">
        <div class="text-3xl">🐾</div>
        <div><p class="font-bold">Pet Alert!</p><p id="notification-message" class="text-sm opacity-90"></p></div>
      </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-full flex flex-col items-center justify-center p-6">
      <div class="w-full max-w-md fade-in text-center">
        <div class="text-7xl mb-4">🏠🐕</div>
        <h1 class="text-4xl font-extrabold text-white mb-8">Pet Door Tracker</h1>
        <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 border border-white/20 space-y-5 text-left">
          <input type="text" placeholder="Username" class="w-full px-5 py-4 rounded-xl bg-white/90 focus:ring-4 focus:ring-emerald-400/50 outline-none">
          <input type="password" placeholder="Password" class="w-full px-5 py-4 rounded-xl bg-white/90 focus:ring-4 focus:ring-emerald-400/50 outline-none">
          <button onclick="showScreen('setup-screen')" class="w-full py-4 bg-emerald-500 text-white font-bold rounded-xl text-lg hover:scale-[1.02] transition-all">Login 🐾</button>
        </div>
      </div>
    </div>

    <!-- Setup Screen -->
    <div id="setup-screen" class="min-h-full flex flex-col items-center justify-center p-6 hidden">
      <div class="w-full max-w-md fade-in bg-white/10 backdrop-blur-lg rounded-3xl p-8 border border-white/20 space-y-6">
        <h2 class="text-white font-bold text-2xl text-center">Simulation Setup</h2>
        <input type="text" id="owner-name" placeholder="Your Name" class="w-full px-5 py-4 rounded-xl bg-white/90 outline-none">
        <input type="text" id="pet-names" placeholder="Pet Names (e.g. Max, Bella)" class="w-full px-5 py-4 rounded-xl bg-white/90 outline-none">
        <div class="border-t border-white/20 pt-4">
          <p id="sim-status" class="text-amber-300 text-sm mb-4">Simulator Status: Idle</p>
          <button onclick="verifySim()" class="w-full py-4 bg-blue-500 text-white font-bold rounded-xl mb-3">Verify Simulator</button>
          <button id="start-btn" onclick="startTracking()" class="w-full py-4 bg-emerald-500 text-white font-bold rounded-xl opacity-50 cursor-not-allowed" disabled>Start Tracking 🐾</button>
        </div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="tracking-screen" class="min-h-full p-6 hidden">
      <div class="max-w-md mx-auto">
        <div id="status-card" class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 border border-white/20 text-center mb-8 transition-all">
          <div id="status-icon" class="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-500/30">
            <i data-lucide="activity" class="text-emerald-400 w-8 h-8"></i>
          </div>
          <h2 class="text-white text-xl font-bold uppercase tracking-widest">Live Feed</h2>
        </div>
        <div id="activity-list" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    function showScreen(id) {
      ['login-screen', 'setup-screen', 'tracking-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }
    function verifySim() {
      const s = document.getElementById('sim-status');
      s.innerText = "Simulator Ready ✓"; s.className = "text-emerald-400 text-sm mb-4";
      document.getElementById('start-btn').disabled = false;
      document.getElementById('start-btn').classList.remove('opacity-50', 'cursor-not-allowed');
    }
    function startTracking() {
      showScreen('tracking-screen');
      const pets = document.getElementById('pet-names').value.split(',').map(p => p.trim());
      setInterval(() => {
        const pet = pets[Math.floor(Math.random() * pets.length)] || "Pet";
        const action = Math.random() > 0.5 ? "entered" : "exited";
        const toast = document.getElementById('notification-toast');
        document.getElementById('notification-message').innerText = `${pet} has ${action}`;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 3000);
        
        const item = document.createElement('div');
        item.className = "activity-item bg-white/5 border border-white/10 p-5 rounded-2xl text-white flex justify-between";
        item.innerHTML = `<div><p class="font-bold">${pet}</p><p class="text-xs opacity-50">${action}</p></div><span class="text-[10px] opacity-30">${new Date().toLocaleTimeString()}</span>`;
        const list = document.getElementById('activity-list');
        list.prepend(item);
        if (list.children.length > 6) list.lastElementChild.remove();
        document.getElementById('status-card').classList.add('sensor-active');
        setTimeout(() => document.getElementById('status-card').classList.remove('sensor-active'), 1000);
      }, 5000);
    }
  </script>
</body>
</html>
