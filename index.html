<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Door Simulator</title>
  <script src="https://tailwindcss.com"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .sim-active { animation: pulse-glow 1.5s ease-in-out infinite; }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
      50% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); }
    }
    .log-entry { animation: slide-in 0.3s ease-out; }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="h-full bg-[#1a1a2e] text-white">
  <div id="app-wrapper" class="min-h-screen p-6 flex flex-col items-center justify-center bg-gradient-to-br from-[#1a1a2e] via-[#16213e] to-[#0f3460]">
    
    <!-- Status Card -->
    <div class="w-full max-w-md bg-white/10 backdrop-blur-lg rounded-3xl p-8 border border-white/10 shadow-2xl mb-8 text-center">
      <div id="door-status-icon" class="w-24 h-24 bg-slate-700 rounded-full flex items-center justify-center mx-auto mb-4 transition-all duration-500">
        <span class="text-4xl">🏠</span>
      </div>
      <h1 class="text-3xl font-extrabold mb-2">Pet Door Tracker</h1>
      <p id="status-text" class="text-slate-400 font-semibold uppercase tracking-widest text-sm">System Idle</p>
      
      <!-- Simulation Button -->
      <button id="sim-btn" class="mt-8 w-full py-4 bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all rounded-2xl font-bold text-lg shadow-lg">
        Start Simulation
      </button>
    </div>

    <!-- Activity Log -->
    <div class="w-full max-w-md bg-black/40 rounded-2xl p-6 border border-white/5">
      <h2 class="text-xs font-bold text-slate-500 uppercase mb-4 tracking-tighter">Live Activity Log</h2>
      <div id="activity-log" class="space-y-3 h-48 overflow-y-auto pr-2 custom-scrollbar">
        <p class="text-slate-500 text-sm italic">Waiting for simulation...</p>
      </div>
    </div>
  </div>

  <script>
    const simBtn = document.getElementById('sim-btn');
    const statusText = document.getElementById('status-text');
    const statusIcon = document.getElementById('door-status-icon');
    const log = document.getElementById('activity-log');
    
    let isSimulating = false;
    const pets = ['Buddy 🐕', 'Luna 🐈', 'Oliver 🐈‍⬛', 'Max 🐕‍🦺'];
    const actions = ['exited to the garden', 'returned inside', 'is peaking through', 'is waiting at the door'];

    function addLog(message) {
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const entry = document.createElement('div');
      entry.className = 'log-entry flex justify-between items-center text-sm border-b border-white/5 pb-2';
      entry.innerHTML = `<span>${message}</span><span class="text-blue-400 font-mono text-xs">${time}</span>`;
      log.prepend(entry);
      if (log.children.length > 6) log.lastElementChild.remove();
    }

    simBtn.addEventListener('click', () => {
      if (!isSimulating) {
        // Start Sim
        isSimulating = true;
        simBtn.textContent = 'Stop Simulation';
        simBtn.classList.replace('bg-blue-600', 'bg-red-500');
        statusText.textContent = 'Simulating Activity...';
        statusText.classList.add('text-blue-400');
        statusIcon.classList.add('sim-active', 'bg-blue-900/50');
        log.innerHTML = '';
        addLog('🚀 Simulation initialized');
        
        window.simInterval = setInterval(() => {
          const pet = pets[Math.floor(Math.random() * pets.length)];
          const action = actions[Math.floor(Math.random() * actions.length)];
          addLog(`${pet} ${action}`);
          
          // Visual pop on icon
          statusIcon.classList.add('scale-110');
          setTimeout(() => statusIcon.classList.remove('scale-110'), 200);
        }, 3000);

      } else {
        // Stop Sim
        isSimulating = false;
        clearInterval(window.simInterval);
        simBtn.textContent = 'Start Simulation';
        simBtn.classList.replace('bg-red-500', 'bg-blue-600');
        statusText.textContent = 'System Idle';
        statusText.classList.remove('text-blue-400');
        statusIcon.classList.remove('sim-active', 'bg-blue-900/50');
        addLog('🛑 Simulation ended');
      }
    });
  </script>
</body>
</html>
