<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Door Tracker</title>
  <script src="https://tailwindcss.com"></script>
  <!-- Simulation Script replaces SDKs -->
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
      font-family: 'Nunito', sans-serif;
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
      50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.8); }
    }
    
    @keyframes slide-in {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .sensor-active {
      animation: pulse-glow 1.5s ease-in-out infinite;
    }
    
    .notification-slide {
      animation: slide-in 0.5s ease-out;
    }
    
    .fade-in {
      animation: fade-in 0.6s ease-out forwards;
    }
    
    .activity-item {
      animation: fade-in 0.4s ease-out;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="https://tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="https://jsdelivr.net" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
   <!-- Notification Toast (Exactly your code) -->
   <div id="notification-toast" class="fixed top-4 right-4 z-50 hidden">
    <div class="bg-emerald-500 text-white px-6 py-4 rounded-2xl shadow-2xl notification-slide flex items-center gap-3 max-w-sm">
     <div class="text-3xl">
      🐾
     </div>
     <div>
       <p class="font-bold">Activity Detected!</p>
       <p id="toast-msg">A pet has used the door.</p>
     </div>
    </div>
   </div>

   <!-- Your Container -->
   <div class="flex flex-col items-center justify-center min-h-screen">
     <div id="status-box" class="p-10 bg-white/5 rounded-3xl border border-white/10 text-center">
       <div id="door-icon" class="mb-4 text-emerald-400">
         <i data-lucide="log-in" class="w-12 h-12 mx-auto"></i>
       </div>
       <button id="sim-btn" class="bg-emerald-500 text-white font-bold py-3 px-10 rounded-xl hover:bg-emerald-400 transition-all">
         Start Sim
       </button>
     </div>
   </div>

  </div>

  <script>
    lucide.createIcons();
    const btn = document.getElementById('sim-btn');
    const toast = document.getElementById('notification-toast');
    const icon = document.getElementById('door-icon');
    let active = false;

    btn.addEventListener('click', () => {
      active = !active;
      if(active) {
        btn.innerText = "Stop Sim";
        icon.classList.add('sensor-active');
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 3000);
      } else {
        btn.innerText = "Start Sim";
        icon.classList.remove('sensor-active');
        toast.classList.add('hidden');
      }
    });
  </script>
 </body>
</html>
