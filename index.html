<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Door Tracker</title>
  <script src="https://tailwindcss.com"></script>
  <!-- REMOVED: Arduino/Sensor SDKs -->
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
      font-family: 'Nunito', sans-serif;
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
      50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.8); }
    }
    
    @keyframes slide-in {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .sensor-active {
      animation: pulse-glow 1.5s ease-in-out infinite;
    }
    
    .notification-slide {
      animation: slide-in 0.5s ease-out;
    }
    
    .fade-in {
      animation: fade-in 0.6s ease-out forwards;
    }
    
    .activity-item {
      animation: fade-in 0.4s ease-out;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="https://tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="https://jsdelivr.net" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
   
   <!-- Notification Toast -->
   <div id="notification-toast" class="fixed top-4 right-4 z-50 hidden">
    <div class="bg-emerald-500 text-white px-6 py-4 rounded-2xl shadow-2xl notification-slide flex items-center gap-3 max-w-sm">
     <div class="text-3xl">
      🐾
     </div>
     <div class="flex-1">
      <p class="font-bold">Activity Detected!</p>
      <p id="toast-text" class="text-sm opacity-90">Pet passed through door</p>
     </div>
    </div>
   </div>

   <!-- START SIM BUTTON (Replaced Sensor UI) -->
   <div class="flex flex-col items-center justify-center min-h-screen px-6">
     <div id="status-indicator" class="w-32 h-32 rounded-full bg-slate-800 flex items-center justify-center mb-8 transition-all duration-500">
       <i data-lucide="door-open" class="text-white w-12 h-12"></i>
     </div>

     <button id="sim-btn" class="bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-4 px-8 rounded-2xl shadow-xl transition-all active:scale-95">
       Start Simulation
     </button>

     <div id="activity-feed" class="mt-12 w-full max-w-sm space-y-4">
       <!-- Log items go here -->
     </div>
   </div>

  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    const simBtn = document.getElementById('sim-btn');
    const toast = document.getElementById('notification-toast');
    const indicator = document.getElementById('status-indicator');
    const feed = document.getElementById('activity-feed');
    
    let isRunning = false;

    function triggerEvent() {
      const pets = ["Luna", "Buddy", "Oliver"];
      const pet = pets[Math.floor(Math.random() * pets.length)];
      
      // Trigger Toast
      document.getElementById('toast-text').innerText = `${pet} used the door!`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);

      // Add to Activity Feed
      const item = document.createElement('div');
      item.className = "activity-item bg-white/10 p-4 rounded-xl text-white flex justify-between items-center border border-white/10";
      item.innerHTML = `<span>${pet} entered/exited</span> <span class="text-xs opacity-50">Just now</span>`;
      feed.prepend(item);
    }

    simBtn.addEventListener('click', () => {
      isRunning = !isRunning;
      
      if (isRunning) {
        simBtn.innerText = "Stop Simulation";
        simBtn.classList.replace('bg-emerald-500', 'bg-rose-500');
        indicator.classList.add('sensor-active', 'bg-emerald-500/20');
        window.simTimer = setInterval(triggerEvent, 4000);
      } else {
        simBtn.innerText = "Start Simulation";
        simBtn.classList.replace('bg-rose-500', 'bg-emerald-500');
        indicator.classList.remove('sensor-active', 'bg-emerald-500/20');
        clearInterval(window.simTimer);
      }
    });
  </script>
 </body>
</html>
